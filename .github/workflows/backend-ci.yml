name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'fraudguard-backend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'fraudguard-backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fraudguard_test
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      working-directory: ./fraudguard-backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run migrations
      working-directory: ./fraudguard-backend
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/fraudguard_test
      run: |
        alembic upgrade head
    - name: Run pytest
      working-directory: ./fraudguard-backend
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/fraudguard_test
        REDIS_URL: redis://localhost:6379/0
      run: |
        pytest
